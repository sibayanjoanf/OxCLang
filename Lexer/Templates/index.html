<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxCLang Compiler</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="header">
    <div class="header-left">
        <div class="logo">
            <h1>OxC Lang</h1>
        </div>
        <div class="header-divider"></div>
        <button class="file-btn" id="openButton">
            <svg viewBox="0 0 12 12" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 2h5l2 2v7H2V2z"/><path d="M7 2v2h2"/>
            </svg>
            Open
        </button>
        <button class="file-btn" id="saveButton">
            <svg viewBox="0 0 12 12" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 7.5V10H3V7.5"/><path d="M6 2v5.5M4.5 6l1.5 1.5L7.5 6"/>
            </svg>
            Save
        </button>
    </div>

    <div class="header-right">
        <button id="themeSwitch" class="theme-switch">
            <i id="theme-icon" class="fas fa-sun"></i>
        </button>
        <button id="styleSwitch" class="theme-switch">
            <i id="style-icon" class="fas fa-wand-magic-sparkles"></i>
        </button>
        <button id="runButton" class="run-button">
            <span class="play-icon">&#9654;</span>
            Run Code
        </button>
    </div>
</div>

    <div class="container">
        <div class="container2">
            <div class="editor-section">
                <div class="editor-wrapper">
                        <div id="lineNumbers" class="line-numbers">1</div>
                        <div id="coloredCode" class="colored"></div>
                        <textarea id="codeInput" placeholder="Start typing your code here..." spellcheck="false" wrap="off"></textarea>
                </div>
            </div>

            <!-- <div class="error-section">
                <div class="error-header">Output Code</div>
                <div id="errorOutput">
                    <pre id="terminalOutput" class="terminal-output"></pre>
                </div>
            </div> -->
        </div>

        <div class="output-section">
            <div class="section-header">
                <div class="tabs">
                    <button class="tab active" id="lexerTab">Lexer</button>
                    <button class="tab" id="outputTab">Output</button>
                </div>
            </div>
            <div class="col-labels" id="colLabels">
                <span>LEXEME</span>
                <span>TOKEN</span>
            </div>
            <div id="tokenOutput"></div>
            <div id="terminalWrapper" style="display:none;">
                <pre id="terminalOutput" class="terminal-output"></pre>
            </div>
        </div>
    </div>

    <script>
        const codeInput = document.getElementById('codeInput');
        const highlight = document.getElementById('coloredCode');
        const lineNumbers = document.getElementById('lineNumbers');
        const tokenOutput = document.getElementById('tokenOutput');
        const errorOutput = document.getElementById('errorOutput');
        const terminalOutput = document.getElementById('terminalOutput');
        // const terminalInputRow = document.getElementById('terminalInputRow');
        // const terminalPrompt = document.getElementById('terminalPrompt');
        // const terminalInput = document.getElementById('terminalInput');
        const runButton = document.getElementById('runButton');
        const themeSwitch = document.getElementById('themeSwitch');
        const themeIcon = document.getElementById('theme-icon');

        const styleSwitch = document.getElementById('styleSwitch');
        const styleIcon = document.getElementById('style-icon');
        const lexerTab = document.getElementById('lexerTab');
        const outputTab = document.getElementById('outputTab');
        const colLabels = document.getElementById('colLabels');
        const terminalWrapper = document.getElementById('terminalWrapper');

        // auto-indent with Tab key
        codeInput.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                
                const start = codeInput.selectionStart;
                const end = codeInput.selectionEnd;
                const value = codeInput.value;
                
                // Insert 2 spaces for a tab
                codeInput.value = value.substring(0, start) + '  ' + value.substring(end);
                codeInput.selectionStart = codeInput.selectionEnd = start + 2;
                codeInput.dispatchEvent(new Event('input'));
            }
            
        //     // Auto-close brackets, parentheses, and braces
        //     const pairs = {
        //         '{': '}',
        //         '(': ')',
        //         '[': ']',
        //         '"': '"',
        //         '\'': '\''
        //     };
            
        //     if (pairs[e.key]) {
        //         e.preventDefault();
                
        //         const start = codeInput.selectionStart;
        //         const end = codeInput.selectionEnd;
        //         const value = codeInput.value;
        //         const opening = e.key;
        //         const closing = pairs[e.key];
                
        //         codeInput.value = value.substring(0, start) + opening + closing + value.substring(end);
        //         codeInput.selectionStart = codeInput.selectionEnd = start + 1;
        //         codeInput.dispatchEvent(new Event('input'));
        //     }
        });

        function switchTab(tab) {
            if (tab === 'output') {
                outputTab.classList.add('active');
                lexerTab.classList.remove('active');
                tokenOutput.style.display = 'none';
                colLabels.style.display = 'none';
                terminalWrapper.style.display = 'flex';
            } else {
                lexerTab.classList.add('active');
                outputTab.classList.remove('active');
                tokenOutput.style.display = '';
                colLabels.style.display = '';
                terminalWrapper.style.display = 'none';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateLineNumbers() {
            const lines = codeInput.value.split('\n');
            const lineCount = lines.length;
            
            let lineNumbersHtml = '';
            for (let i = 1; i <= lineCount; i++) {
                lineNumbersHtml += i + '\n';
            }
            lineNumbers.textContent = lineNumbersHtml;
        }

        function displayTokens(allTokens) {
            const validTokens = (allTokens || []).filter(token => !token.is_error);
            if (validTokens.length === 0) {
                tokenOutput.innerHTML = '<div style="color: #474747; padding: 10px;">No tokens yet. Start typing in the editor...</div>';
            } else {
                tokenOutput.innerHTML = validTokens.map((token, i) => `
                    <div class="token">
                        <span class="token-line">${i + 1}</span>
                        <span class="token-value">${escapeHtml(token.value)}</span>
                        <span class="token-type">${token.type}</span>
                    </div>
                `).join('');
            }
        }

        function resetTerminalUI() {
            terminalOutput.innerHTML = '';
        }

        function renderCompileErrors(lexicalErrors, syntaxErrors, semanticErrors) {
            resetTerminalUI();

            const lines = [];

            (lexicalErrors || []).forEach((e) => {
                lines.push(`<span class="error-color">Lexical Impostor: ${escapeHtml(e.value)} [Line ${e.line}, Col ${e.column}]</span>`);
            });
            (syntaxErrors || []).forEach((e) => {
                lines.push(`<span class="error-color">Syntactical Impostor: ${escapeHtml(e.message)}${e.line > 0 ? ` [Line ${e.line}, Col ${e.column}]` : ''}</span>`);
            });
            (semanticErrors || []).forEach((e) => {
                lines.push(`<span class="error-color">Semantic Impostor: ${escapeHtml(e.message)}${e.line > 0 ? ` [Line ${e.line}, Col ${e.column}]` : ''}</span>`);
            });

            if (lines.length === 0) {
                terminalOutput.textContent = 'No errors detected.\n';
                return;
            }
            terminalOutput.innerHTML = lines.join('\n') + '\n';
        }

        function renderTerminal(terminal) {
            resetTerminalUI();

            let output = terminal.output || '';

            if (terminal.runtime_errors && terminal.runtime_errors.length > 0) {
                const errText = terminal.runtime_errors
                    .map(e => `Runtime error: ${e.message}${e.line ? ` [Line ${e.line}, Col ${e.column}]` : ''}`)
                    .join('\n');
                output += (output.endsWith('\n') || output === '' ? '' : '\n') + errText + '\n';
            }

            if (terminal.waiting_for_input) {
                output = output.replace(/\n$/, '');
                terminalOutput.textContent = output;

                const promptSpan = document.createElement('span');
                promptSpan.className = 'terminal-prompt';
                promptSpan.textContent = terminal.prompt || '';
                terminalOutput.appendChild(promptSpan);

                const input = document.createElement('input');
                input.id = 'terminalInput';
                input.className = 'terminal-input';
                input.type = 'text';
                input.autocomplete = 'off';
                input.spellcheck = false;
                terminalOutput.appendChild(input);
                input.focus();

                input.addEventListener('keydown', handleTerminalInput);
            } else {
                terminalOutput.textContent = output;
            }

            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        }

        function handleTerminalInput(e) {
            if (e.key !== 'Enter') return;
            e.preventDefault();
            if (!terminalSessionId) return;

            const userText = e.target.value;

            fetch('/stdin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: terminalSessionId, input: userText })
            })
            .then(r => r.json())
            .then(data => {
                if (!data.success && data.error) {
                    terminalSessionId = null;
                    resetTerminalUI();
                    terminalOutput.textContent = `${data.error}\n`;
                    return;
                }
                if (data.terminal) {
                    renderTerminal(data.terminal);
                }
            })
            .catch(err => {
                console.error(err);
                resetTerminalUI();
                terminalOutput.textContent = 'Error connecting to server\n';
            });
        }

        function syncHighlight() {
            const codeText = codeInput.value;
            highlight.innerHTML = colorCode(codeText);

            highlight.style.left = (80 - codeInput.scrollLeft) + 'px';
            highlight.style.top = (40 - codeInput.scrollTop) + 'px';
        }

        lexerTab.addEventListener('click', () => switchTab('lexer'));
        outputTab.addEventListener('click', () => switchTab('output'));

        // Sync scroll between line numbers and textarea
        codeInput.addEventListener('scroll', () => {
            lineNumbers.scrollTop = codeInput.scrollTop;
            highlight.style.left = (80 - codeInput.scrollLeft) + 'px';
            highlight.style.top = (40 - codeInput.scrollTop) + 'px';
        });

        // Update line numbers on input
        codeInput.addEventListener('input', (e) => {
            updateLineNumbers();

            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                runLexer();
            }, typingDelay);
        });

        let typingTimer;
        const typingDelay = 200;

        codeInput.addEventListener('input', (e) => {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                runLexer();
            }, typingDelay);
        });

        codeInput.addEventListener('input', syncHighlight);
        
        // run button'ed
        runButton.addEventListener('click', () => {
            runProgram();
        });

        // document.addEventListener('keydown', (e) => {
        //     if (e.key === 'F10') {
        //         e.preventDefault();
        //         runCode();
        //     }
        //     
        // });

        codeInput.addEventListener('input', () =>{
            const codeText = codeInput.value;
            highlight.innerHTML = colorCode(codeText);
        });

        function runLexer() {
            const code = codeInput.value;
            
            fetch('/tokenize', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ code: code })
            })
            .then(response => response.json())
            .then(data => {
                displayTokens(data.all_tokens);
            })
            .catch(error => {
                console.error('Error:', error);
                resetTerminalUI();
                terminalOutput.textContent = 'Error connecting to server\n';
            });
        }

        let terminalSessionId = null;

        function runProgram() {
            switchTab('output');
            const code = codeInput.value;
            
            fetch('/run', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ code: code })
            })
            .then(response => response.json())
            .then(data => {
                const lex = data.lexical_errors || [];
                const syn = data.syntax_errors || [];
                const sem = data.semantic_errors || [];

                if (!data.success && (lex.length || syn.length || sem.length)) {
                    terminalSessionId = null;
                    renderCompileErrors(lex, syn, sem);
                    return;
                }

                if (data.terminal) {
                    terminalSessionId = data.terminal.session_id;
                    renderTerminal(data.terminal);
                    return;
                }

                resetTerminalUI();
                terminalOutput.textContent = 'No terminal data returned.\n';
            })
            .catch(error => {
                console.error('Error:', error);
                resetTerminalUI();
                terminalOutput.textContent = 'Error connecting to server\n';
            });
        }

        function escapeHTML(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\//g, "&#x2F;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#x27;")
                .replace(/=/g, "&#x3D;");
        }

        function colorCode(code) {
            let escaped = escapeHTML(code);

            // data types :D
            escaped = escaped.replace(/\b(int|float|char|string|bool|vacuum|gust|yuh|naur)\b/g,
                '<span class="dataTypes">$1</span>'
            );

            // function words
            escaped = escaped.replace(/\b(air|atmosphere|sizeOf|toBool|toChar|toFall|toFloat|toInt|toRise|toString|waft|gasp|horizon)\b/g,
                '<span class="functions">$1</span>'
            );

            // constants
            escaped = escaped.replace(/\b(universal|wind)\b/g,
                '<span class="consy">$1</span>'
            );

            // other rw
            escaped = escaped.replace(/\b(if|else|elseif|stream|case|diffuse|echo|cycle|do|resist|flow|inhale|exhale)\b/g,
                '<span class="rw">$1</span>'
            );

            // numbers
            escaped = escaped.replace(/\b\d+\b/g,
                '<span class="num">$&</span>'
            );

            console.log(escaped);
            return escaped;
        }

        themeSwitch.addEventListener('click', () => {
            const body = document.body;
            body.classList.toggle('light-theme');

            if (body.classList.contains('light-theme')) {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            } else {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            }
        });

        styleSwitch.addEventListener('click', () => {
            document.body.classList.toggle('cute-theme');
            const isCute = document.body.classList.contains('cute-theme');
            styleIcon.className = isCute ? 'fas fa-minimize' : 'fas fa-wand-magic-sparkles';
        });

        updateLineNumbers();
        displayTokens([]);
        resetTerminalUI();
    </script>
</body>
</html>
