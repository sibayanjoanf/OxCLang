<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxCLang Compiler</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="header">
        <h1>OxC Lang</h1>
        <div class="icons">
            <button id="themeSwitch" class="theme-switch">
                <i id="theme-icon" class="fas fa-sun"></i>
            </button>
            <button id="runButton" class="run-button">
                <span class="play-icon">&#9654;</span>
                Run Code
            </button>
        </div>
    </div>

    <div class="container">
        <div class="editor-section">
            <div class="editor-wrapper">
                    <div id="lineNumbers" class="line-numbers">1</div>
                    <div id="coloredCode" class="colored"></div>
                    <textarea id="codeInput" placeholder="Start typing your code here..." spellcheck="false" wrap="off"></textarea>
            </div>
        </div>

        <div class="output-section">
            <div class="section-header">
                <span>LEXEME</span>
                <span>TOKEN</span>
            </div>
            <div id="tokenOutput"></div>
        </div>
    </div>

    <div class="error-section">
        <div class="error-header">Output Code</div>
        <div id="errorOutput">
            <pre id="terminalOutput" class="terminal-output"></pre>
            <div id="terminalInputRow" class="terminal-input-row" style="display:none;">
                <span id="terminalPrompt" class="terminal-prompt"></span>
                <input id="terminalInput" class="terminal-input" type="text" autocomplete="off" spellcheck="false" />
            </div>
        </div>
    </div>

    <script>
        const codeInput = document.getElementById('codeInput');
        const highlight = document.getElementById('coloredCode');
        const lineNumbers = document.getElementById('lineNumbers');
        const tokenOutput = document.getElementById('tokenOutput');
        const errorOutput = document.getElementById('errorOutput');
        const terminalOutput = document.getElementById('terminalOutput');
        const terminalInputRow = document.getElementById('terminalInputRow');
        const terminalPrompt = document.getElementById('terminalPrompt');
        const terminalInput = document.getElementById('terminalInput');
        const runButton = document.getElementById('runButton');
        const themeSwitch = document.getElementById('themeSwitch');
        const themeIcon = document.getElementById('theme-icon');

        // auto-indent with Tab key
        codeInput.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                
                const start = codeInput.selectionStart;
                const end = codeInput.selectionEnd;
                const value = codeInput.value;
                
                // Insert 4 spaces for a tab
                codeInput.value = value.substring(0, start) + '    ' + value.substring(end);
                codeInput.selectionStart = codeInput.selectionEnd = start + 4;
                codeInput.dispatchEvent(new Event('input'));
            }
            
        //     // Auto-close brackets, parentheses, and braces
        //     const pairs = {
        //         '{': '}',
        //         '(': ')',
        //         '[': ']',
        //         '"': '"',
        //         '\'': '\''
        //     };
            
        //     if (pairs[e.key]) {
        //         e.preventDefault();
                
        //         const start = codeInput.selectionStart;
        //         const end = codeInput.selectionEnd;
        //         const value = codeInput.value;
        //         const opening = e.key;
        //         const closing = pairs[e.key];
                
        //         codeInput.value = value.substring(0, start) + opening + closing + value.substring(end);
        //         codeInput.selectionStart = codeInput.selectionEnd = start + 1;
        //         codeInput.dispatchEvent(new Event('input'));
        //     }
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateLineNumbers() {
            const lines = codeInput.value.split('\n');
            const lineCount = lines.length;
            
            let lineNumbersHtml = '';
            for (let i = 1; i <= lineCount; i++) {
                lineNumbersHtml += i + '\n';
            }
            lineNumbers.textContent = lineNumbersHtml;
        }

        function displayTokens(allTokens) {
            const validTokens = (allTokens || []).filter(token => !token.is_error);
            if (validTokens.length === 0) {
                tokenOutput.innerHTML = '<div style="color: #474747; padding: 10px;">No tokens yet. Start typing in the editor...</div>';
            } else {
                tokenOutput.innerHTML = validTokens.map((token, i) => `
                    <div class="token">
                        <span class="token-line">${i + 1}</span>
                        <span class="token-value">${escapeHtml(token.value)}</span>
                        <span class="token-type">${token.type}</span>
                    </div>
                `).join('');
            }
        }

        function resetTerminalUI() {
            terminalOutput.textContent = '';
            terminalPrompt.textContent = '';
            terminalInput.value = '';
            terminalInputRow.style.display = 'none';
        }

        function renderCompileErrors(lexicalErrors, syntaxErrors, semanticErrors) {
            resetTerminalUI();
            terminalInputRow.style.display = 'none';

            const lines = [];

            (lexicalErrors || []).forEach((e) => {
                lines.push(`Lexical Impostor: ${e.value} [Line ${e.line}, Col ${e.column}]`);
            });
            (syntaxErrors || []).forEach((e) => {
                lines.push(`Syntactical Impostor: ${e.message}${e.line > 0 ? ` [Line ${e.line}, Col ${e.column}]` : ''}`);
            });
            (semanticErrors || []).forEach((e) => {
                lines.push(`Semantic Impostor: ${e.message}${e.line > 0 ? ` [Line ${e.line}, Col ${e.column}]` : ''}`);
            });

            if (lines.length === 0) {
                terminalOutput.textContent = 'No errors detected.\n';
                return;
            }
            terminalOutput.textContent = lines.join('\n') + '\n';
        }

        function renderTerminal(terminal) {
            resetTerminalUI();
            terminalOutput.textContent = terminal.output || '';

            if (terminal.runtime_errors && terminal.runtime_errors.length > 0) {
                const errText = terminal.runtime_errors
                    .map(e => `Runtime error: ${e.message}${e.line ? ` [Line ${e.line}, Col ${e.column}]` : ''}`)
                    .join('\n');
                terminalOutput.textContent += (terminalOutput.textContent.endsWith('\n') || terminalOutput.textContent === '' ? '' : '\n') + errText + '\n';
            }

            terminalOutput.scrollTop = terminalOutput.scrollHeight;

            if (terminal.waiting_for_input) {
                terminalPrompt.textContent = terminal.prompt || '';
                terminalInputRow.style.display = 'flex';
                terminalInput.focus();
            }
        }

        function syncHighlight() {
            const codeText = codeInput.value;
            highlight.innerHTML = colorCode(codeText);

            highlight.style.left = (80 - codeInput.scrollLeft) + 'px';
            highlight.style.top = (40 - codeInput.scrollTop) + 'px';
        }

        // Sync scroll between line numbers and textarea
        codeInput.addEventListener('scroll', () => {
            lineNumbers.scrollTop = codeInput.scrollTop;
            highlight.style.left = (80 - codeInput.scrollLeft) + 'px';
            highlight.style.top = (40 - codeInput.scrollTop) + 'px';
        });

        // Update line numbers on input
        codeInput.addEventListener('input', (e) => {
            updateLineNumbers();

            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                runLexer();
            }, typingDelay);
        });

        let typingTimer;
        const typingDelay = 200;

        codeInput.addEventListener('input', (e) => {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                runLexer();
            }, typingDelay);
        });

        codeInput.addEventListener('input', syncHighlight);
        
        // run button'ed
        runButton.addEventListener('click', () => {
            runProgram();
        });

        // document.addEventListener('keydown', (e) => {
        //     if (e.key === 'F10') {
        //         e.preventDefault();
        //         runCode();
        //     }
        //     
        // });

        codeInput.addEventListener('input', () =>{
            const codeText = codeInput.value;
            highlight.innerHTML = colorCode(codeText);
        });

        function runLexer() {
            const code = codeInput.value;
            
            fetch('/tokenize', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ code: code })
            })
            .then(response => response.json())
            .then(data => {
                displayTokens(data.all_tokens);
            })
            .catch(error => {
                console.error('Error:', error);
                resetTerminalUI();
                terminalOutput.textContent = 'Error connecting to server\n';
            });
        }

        let terminalSessionId = null;

        function runProgram() {
            const code = codeInput.value;
            
            fetch('/run', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ code: code })
            })
            .then(response => response.json())
            .then(data => {
                const lex = data.lexical_errors || [];
                const syn = data.syntax_errors || [];
                const sem = data.semantic_errors || [];

                if (!data.success && (lex.length || syn.length || sem.length)) {
                    terminalSessionId = null;
                    renderCompileErrors(lex, syn, sem);
                    return;
                }

                if (data.terminal) {
                    terminalSessionId = data.terminal.session_id;
                    renderTerminal(data.terminal);
                    return;
                }

                resetTerminalUI();
                terminalOutput.textContent = 'No terminal data returned.\n';
            })
            .catch(error => {
                console.error('Error:', error);
                resetTerminalUI();
                terminalOutput.textContent = 'Error connecting to server\n';
            });
        }

        terminalInput.addEventListener('keydown', (e) => {
            if (e.key !== 'Enter') return;
            e.preventDefault();
            if (!terminalSessionId) return;

            const userText = terminalInput.value;
            terminalInput.value = '';

            fetch('/stdin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: terminalSessionId, input: userText })
            })
            .then(r => r.json())
            .then(data => {
                if (!data.success && data.error) {
                    terminalSessionId = null;
                    resetTerminalUI();
                    terminalOutput.textContent = `${data.error}\n`;
                    return;
                }
                if (data.terminal) {
                    renderTerminal(data.terminal);
                }
            })
            .catch(err => {
                console.error(err);
                resetTerminalUI();
                terminalOutput.textContent = 'Error connecting to server\n';
            });
        });

        function escapeHTML(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\//g, "&#x2F;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#x27;")
                .replace(/=/g, "&#x3D;");
        }

        function colorCode(code) {
            let escaped = escapeHTML(code);

            // data types :D
            escaped = escaped.replace(/\b(int|float|char|string|bool|vacuum|gust|yuh|naur)\b/g,
                '<span class="dataTypes">$1</span>'
            );

            // function words
            escaped = escaped.replace(/\b(air|atmosphere|sizeOf|toBool|toChar|toFall|toFloat|toInt|toRise|toString|waft|gasp|horizon)\b/g,
                '<span class="functions">$1</span>'
            );

            // constants
            escaped = escaped.replace(/\b(universal|wind)\b/g,
                '<span class="consy">$1</span>'
            );

            // other rw
            escaped = escaped.replace(/\b(if|else|elseif|stream|case|diffuse|echo|cycle|do|resist|flow|inhale|exhale)\b/g,
                '<span class="rw">$1</span>'
            );

            // numbers
            escaped = escaped.replace(/\b\d+\b/g,
                '<span class="num">$&</span>'
            );

            console.log(escaped);
            return escaped;
        }

        themeSwitch.addEventListener('click', () => {
            const body = document.body;
            body.classList.toggle('light-theme');
            
            if (body.classList.contains('light-theme')) {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            } else {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            }
        });

        updateLineNumbers();
        displayTokens([]);
        resetTerminalUI();
    </script>
</body>
</html>
